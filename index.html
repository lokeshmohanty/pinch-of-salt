<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinch of Salt - Unbiased News & History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
</head>

<body>
    <header>
        <h1>Pinch of Salt</h1>
        <p class="subtitle">History-linked news with accurate facts</p>
    </header>

    <div id="loading-splash">
        <h1>Pinch of Salt</h1>
        <div class="loading-spinner"></div>
        <p class="subtitle">Verifying global news sources...</p>
    </div>

    <main class="container">
        <div class="filters">
            <button class="filter-btn active" onclick="filterNews('all')">All Events</button>
            <button class="filter-btn" onclick="filterNews('multi')">Top Clustered</button>
            <div class="filter-group">
                <select id="geo-filter" class="filter-select" onchange="applyFilters()">
                    <option value="all">Global (All Regions)</option>
                    <option value="India">India</option>
                    <option value="US">US</option>
                    <option value="Middle East">Middle East</option>
                    <option value="Global">International</option>
                </select>
                <select id="type-filter" class="filter-select" onchange="applyFilters()">
                    <option value="all">All Types</option>
                    <option value="Technical">Technical</option>
                    <option value="Geopolitical">Geopolitical</option>
                    <option value="Economic">Economic</option>
                    <option value="General">General</option>
                </select>
            </div>
            <a href="knowledge.html" class="filter-btn kg-btn">Knowledge Graph ↗</a>
            <a href="workflow.html" class="filter-btn" style="background: rgba(255,255,255,0.05)">System Workflow</a>
        </div>

        <div id="news-grid">
            <!-- Clusters will be injected here -->
            <div class="loading-spinner"></div>
        </div>
    </main>

    <!-- Modal for Comparison -->
    <div id="compare-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
