name: Update News & Deploy

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      
      - name: Build and Run Core Engine
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p data
          uv run src/python/main.py
      
      - name: Persist Knowledge Graph (Git LFS)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git lfs install
          git add -f data/pinch.db
          # Only commit if there are changes to avoid failing the job
          git diff-index --quiet HEAD || git commit -m "chore: persist knowledge graph database [skip ci]"
          git push
          
      - name: Prepare Deployment
        run: |
          mkdir -p public/data
          cp -r src/frontend/* public/
          cp data/pinch.db public/data/
          touch public/.nojekyll
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
