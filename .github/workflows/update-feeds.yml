name: Update News & Deploy

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Restore cache
        uses: Swatinem/rust-cache@v2
      
      - name: Build and Run Core Engine
        env:
          NEWS_PROC_API_KEY: ${{ secrets.NEWS_PROC_API_KEY }}
        run: |
          cd core
          cargo run --release
      
      - name: Prepare Deployment
        run: |
          mkdir -p deploy/data
          cp frontend/* deploy/
          cp data/pinch.db deploy/data/
          cp data/history_data.json deploy/data/
          touch deploy/.nojekyll
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true
